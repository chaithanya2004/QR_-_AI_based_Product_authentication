<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <h1>Authentication Result</h1>

    <img src="{{ img_path }}" width="250" style="border-radius:10px;">

    <h2>Status: {{ ai_result }}</h2>
    <h3>QR Raw Data:</h3>
    <p>{{ qr_data }}</p>

    <h3>Product Details Extracted:</h3>

    {% if product_info %}
        <table border="1" cellpadding="10">
            {% for key, value in product_info.items() %}
                <tr>
                    <td><b>{{ key | capitalize }}</b></td>
                    <td>{{ value }}</td>
                </tr>
            {% endfor %}
        </table>
    {% else %}
        <p style="color:red;">❌ No product details found inside QR code</p>
    {% endif %}

    <br>
    <a href="/">Go Back</a>

</body>
</html>
