<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <style>
        body { background:#d892ce; color:white; text-align:center; font-family:Arial; }
        .card { margin-top: 120px; background:#1a1a1a; padding:100px; width:400px;
                border-radius:20px; margin:auto; box-shadow:0px 0px 20px #00eaff; }
        input { width:80%; padding:12px; margin:10px; border-radius:10px; border:none; }
        button { padding:12px 20px; background:#00eaff; border:none; border-radius:10px; font-weight:bold; }
        button:hover { background:#0099ff; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color:#00eaff;">Signup</h1>
    <form action="/signup_user" method="POST">
        <input type="text" placeholder="Name" required><br>
        <input type="email" placeholder="Email" required><br>
        <input type="password" placeholder="Password" required><br>
        <button type="submit">Create Account</button>
    </form>
</div>

</body>
</html>
