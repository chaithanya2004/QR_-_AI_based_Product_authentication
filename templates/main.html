<!DOCTYPE html>
<html>
<head>
    <title>Main | Authenticity Checker</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1350&q=80') no-repeat center center/cover;
            font-family: Arial, sans-serif;
            color: white;
            height: 100vh;
        }

        .overlay {
            background: rgba(14, 105, 241, 0.75);
            position: absolute;
            left: 0; top: 0;
            width: 100%;
            height: 100%;
        }

        .header {
            width: 100%;
            padding: 20px 40px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #00eaff;
            letter-spacing: 1px;
        }

        .nav a {
            margin: 0 10px;
            padding: 10px 20px;
            text-decoration: none;
            color: #00eaff;
            font-weight: bold;
            border: 2px solid #00eaff;
            border-radius: 8px;
        }

        .nav a:hover {
            background: #00eaff;
            color: black;
        }

        .hero {
            position: relative;
            z-index: 2;
            margin-top: 120px;
            text-align: center;
        }

        .hero h1 {
            font-size: 55px;
            color: #00eaff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #00eaff;
        }

        .hero p {
            font-size: 20px;
            color: #ddd;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="header">
    <div class="logo">AI Authenticity Checker</div>
</div>

<div class="hero">
    <h1>Verify Products with AI + QR</h1>
    <p>Ensure genuine products using advanced artificial intelligence</p>

    <div class="nav" style="margin-top: 30px;">
        <a href="/login">Login</a>
        <a href="/signup">Signup</a>
    </div>
</div>

</body>
</html>
